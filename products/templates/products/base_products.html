{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'products/css/products.css' %}">
{% endblock %}

{% block content %}
<nav class="products-nav">
    <div class="nav-container">
        <div class="nav-content">
            <a href="{% url 'products:product_list' %}" class="nav-brand">Products</a>
            <ul class="nav-menu">
                <li class="nav-item {% if request.resolver_match.url_name == 'product_list' %}active{% endif %}">
                    <a href="{% url 'products:product_list' %}">
                        <i class="fas fa-box nav-icon"></i> Products
                    </a>
                </li>
                <li class="nav-item {% if request.resolver_match.url_name == 'category_list' %}active{% endif %}">
                    <a href="{% url 'products:category_list' %}">
                        <i class="fas fa-tags nav-icon"></i> Categories
                    </a>
                </li>
                <li class="nav-item {% if request.resolver_match.url_name == 'supplier_list' %}active{% endif %}">
                    <a href="{% url 'products:supplier_list' %}">
                        <i class="fas fa-truck nav-icon"></i> Suppliers
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'dashboard:main_dashboard' %}">
                        <i class="fas fa-arrow-left nav-icon"></i> Back to Dashboard
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="products-container">
    {% block product_content %}{% endblock %}
</div>
{% endblock %}
