{% extends "products/base_products.html" %}
{% load static %}

{% block product_content %}
<div class="header-actions">
    <h1>{{ action }} Supplier</h1>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label" for="id_name">Name</label>
            {{ form.name }}
        </div>
        <div class="form-group">
            <label class="form-label" for="id_contact_person">Contact Person</label>
            {{ form.contact_person }}
        </div>
        <div class="form-group">
            <label class="form-label" for="id_email">Email</label>
            {{ form.email }}
        </div>
        <div class="form-group">
            <label class="form-label" for="id_phone">Phone</label>
            {{ form.phone }}
        </div>
        <div class="form-group">
            <label class="form-label" for="id_address">Address</label>
            {{ form.address }}
        </div>
        <div class="form-group">
            <label class="form-label" for="id_is_active">Status</label>
            {{ form.is_active }}
        </div>
        <div class="form-group">
            <button type="submit" class="btn btn-primary">{{ action }} Supplier</button>
            <a href="{% url 'products:supplier_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
